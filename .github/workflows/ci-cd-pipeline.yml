name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'packages/mobile/**'
      - 'packages/web/**'
      - '.github/workflows/ci-cd-pipeline.yml'
      - 'pubspec.yaml'
      - 'package.json'
      - 'firebase*.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - staging
        - production
      dry_run:
        description: 'Run in dry-run mode (skip actual deployments)'
        required: false
        default: true
        type: boolean
  pull_request:
    branches: [main, develop, staging]
    paths:
      - 'packages/**'
      - '.github/workflows/**'
      - 'firebase*.json'
      - 'pubspec.yaml'
      - 'package.json'

env:
  FLUTTER_VERSION: '3.35.7'
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' || contains(github.event.head_commit.message, '[DRY-RUN]') || contains(github.event.head_commit.message, '[SKIP-DEPLOY]') }}
  NODE_VERSION: '18'

jobs:
    # 🔍 Quality Checks
  quality-check:
    name: 🔍 Quality Check
    runs-on: self-hosted
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        run: |
          # Download and setup Flutter manually
          FLUTTER_VERSION="${{ env.FLUTTER_VERSION }}"
          FLUTTER_ARCHIVE="flutter_macos_${FLUTTER_VERSION}-stable.zip"
          FLUTTER_URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/${FLUTTER_ARCHIVE}"
          
          echo "Downloading Flutter ${FLUTTER_VERSION}..."
          curl -L "$FLUTTER_URL" -o "$RUNNER_TEMP/flutter.zip"
          
          echo "Extracting Flutter..."
          unzip -q "$RUNNER_TEMP/flutter.zip" -d "$RUNNER_TEMP"
          
          echo "Setting up Flutter path..."
          FLUTTER_BIN="$RUNNER_TEMP/flutter/bin"
          echo "$FLUTTER_BIN" >> $GITHUB_PATH
          export PATH="$FLUTTER_BIN:$PATH"
          
          echo "Checking Flutter binary permissions..."
          ls -la "$FLUTTER_BIN/flutter"
          ls -la "$FLUTTER_BIN/cache/dart-sdk/bin/dart"
          
          echo "Running flutter doctor to initialize..."
          "$FLUTTER_BIN/flutter" doctor --verbose || echo "Flutter doctor failed, but continuing..."
          
          echo "Verifying Flutter installation..."
          "$FLUTTER_BIN/flutter" --version

      - name: 📦 Install Dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: 🔧 Flutter Analyze
        run: flutter analyze
        working-directory: packages/mobile

      - name: 🧪 Run Tests
        run: flutter test --coverage --test-randomize-ordering-seed random
        working-directory: packages/mobile

      - name: 🧪 Run Integration Tests
        run: flutter test integration_test --test-randomize-ordering-seed random
        working-directory: packages/mobile

      - name: 📊 Check Test Coverage
        run: |
          # Function to extract coverage data for a service
          get_coverage() {
            local service_file=$1
            local start_line=$(grep -n "SF:$service_file" coverage/lcov.info | cut -d: -f1)

            # Find the LF and LH lines that come after this SF line
            local lf_line=$(tail -n +$start_line coverage/lcov.info | grep -m 1 "LF:" | cut -d: -f2)
            local lh_line=$(tail -n +$start_line coverage/lcov.info | grep -m 1 "LH:" | cut -d: -f2)

            echo "$lh_line:$lf_line"
          }

          echo "📊 Checking test coverage thresholds..."

          # Purchase Service: 70% minimum
          PURCHASE_DATA=$(get_coverage "lib/core/services/purchase_service.dart")
          PURCHASE_COVERAGE=$(echo $PURCHASE_DATA | cut -d: -f1)
          PURCHASE_TOTAL=$(echo $PURCHASE_DATA | cut -d: -f2)
          PURCHASE_PERCENT=$(( PURCHASE_COVERAGE * 100 / PURCHASE_TOTAL ))

          # Consent Service: 20% minimum
          CONSENT_DATA=$(get_coverage "lib/core/services/consent_service.dart")
          CONSENT_COVERAGE=$(echo $CONSENT_DATA | cut -d: -f1)
          CONSENT_TOTAL=$(echo $CONSENT_DATA | cut -d: -f2)
          CONSENT_PERCENT=$(( CONSENT_COVERAGE * 100 / CONSENT_TOTAL ))

          # Leaderboard Service: 5% minimum
          LEADERBOARD_DATA=$(get_coverage "lib/core/services/leaderboard_service.dart")
          LEADERBOARD_COVERAGE=$(echo $LEADERBOARD_DATA | cut -d: -f1)
          LEADERBOARD_TOTAL=$(echo $LEADERBOARD_DATA | cut -d: -f2)
          LEADERBOARD_PERCENT=$(( LEADERBOARD_COVERAGE * 100 / LEADERBOARD_TOTAL ))

          # Integration Test Coverage: Check for integration test files
          INTEGRATION_TESTS=$(find test/integration -name "*_integration_test.dart" | wc -l)
          INTEGRATION_TESTS_RUN=$(find . -name "*integration_test*" -type f | wc -l)

          echo "Purchase Service: $PURCHASE_COVERAGE/$PURCHASE_TOTAL lines ($PURCHASE_PERCENT%)"
          echo "Consent Service: $CONSENT_COVERAGE/$CONSENT_TOTAL lines ($CONSENT_PERCENT%)"
          echo "Leaderboard Service: $LEADERBOARD_COVERAGE/$LEADERBOARD_TOTAL lines ($LEADERBOARD_PERCENT%)"
          echo "Integration Tests: $INTEGRATION_TESTS files found"

          # Check thresholds
          if [ $PURCHASE_PERCENT -lt 70 ]; then
            echo "❌ Purchase service coverage ($PURCHASE_PERCENT%) below 70% threshold"
            exit 1
          fi

          if [ $CONSENT_PERCENT -lt 20 ]; then
            echo "❌ Consent service coverage ($CONSENT_PERCENT%) below 20% threshold"
            exit 1
          fi

          if [ $LEADERBOARD_PERCENT -lt 5 ]; then
            echo "❌ Leaderboard service coverage ($LEADERBOARD_PERCENT%) below 5% threshold"
            exit 1
          fi

          if [ $INTEGRATION_TESTS -lt 3 ]; then
            echo "❌ Integration test coverage insufficient ($INTEGRATION_TESTS files, minimum 3 required)"
            exit 1
          fi

          echo "✅ All coverage thresholds met!"

      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: packages/mobile/coverage/lcov.info
          flags: flutter

  # 🏗️ Build Web App
  build-web:
    name: 🏗️ Build Web App
    runs-on: self-hosted
    needs: quality-check
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'production')
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci
        working-directory: packages/web

      - name: � Check Dry Run Status
        run: |
          if [[ "${{ env.DRY_RUN }}" == "true" ]]; then
            echo "🏃 DRY RUN MODE: Skipping actual deployments"
            echo "This run will test the pipeline without consuming resources"
          else
            echo "🚀 LIVE MODE: Full deployment will proceed"
          fi

      - name: 🏗️ Build Web App
        run: npm run build
        working-directory: packages/web

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: packages/web/dist/
          retention-days: 7

  # 🔥 Deploy Web App
  deploy-web:
    name: 🔥 Deploy Web App
    runs-on: self-hosted
    needs: build-web
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch')
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'production' && 'PRODUCTION' || github.event.inputs.environment == 'staging' && 'STAGING' || 'DEVELOPMENT') || (github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT') }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: packages/web/dist/

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔥 Deploy to Firebase Hosting
        if: env.DRY_RUN != 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          # Determine environment and config
          ENVIRONMENT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'development') }}"
          echo "🚀 Deploying to $ENVIRONMENT environment"

          if [[ "$ENVIRONMENT" == "production" ]]; then
            CONFIG_FILE="firebase.prod.json"
            PROJECT_ID="modulo-squares-prod"
          elif [[ "$ENVIRONMENT" == "staging" ]]; then
            CONFIG_FILE="firebase.staging.json"
            PROJECT_ID="modulo-squares-staging"
          else
            CONFIG_FILE="firebase.dev.json"
            PROJECT_ID="modulo-squares-dev"
          fi

          # Check if Firebase token is available
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "❌ FIREBASE_TOKEN secret is not configured"
            exit 1
          fi

          # Copy environment-specific config
          cp "$CONFIG_FILE" firebase.json

          # Deploy to the website target (configured in firebase.json)
          firebase use "$PROJECT_ID" --token "$FIREBASE_TOKEN"
          firebase deploy --only hosting:website --token "$FIREBASE_TOKEN"

  # 📊 Deployment Summary
  deployment-summary:
    name: 📊 Deployment Summary
    runs-on: self-hosted
    needs: [quality-check, build-web, deploy-web]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## � CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Quality Check | ${{ needs.quality-check.result }} | Tests & Analysis |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Web Build | ${{ needs.build-web.result }} | Build artifacts created |" >> $GITHUB_STEP_SUMMARY
          echo "| � Web Deploy | ${{ needs.deploy-web.result }} | Firebase Hosting |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT') }}" >> $GITHUB_STEP_SUMMARY
