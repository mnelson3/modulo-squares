name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/**'
      - '.github/workflows/**'
      - 'firebase*.json'
      - 'pubspec.yaml'
      - 'package.json'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/**'
      - '.github/workflows/**'
      - 'firebase*.json'
      - 'pubspec.yaml'
      - 'package.json'

env:
  FLUTTER_VERSION: '3.32.0'
  NODE_VERSION: '18'

jobs:
  # 🔍 Quality Checks
  quality-check:
    name: 🔍 Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: 🔧 Flutter Analyze
        run: flutter analyze
        working-directory: packages/mobile

      - name: 🧪 Run Tests
        run: flutter test --coverage --test-randomize-ordering-seed random
        working-directory: packages/mobile

      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: packages/mobile/coverage/lcov.info
          flags: flutter

  # 🏗️ Build Web App
  build-web:
    name: 🏗️ Build Web App
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/web/package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci
        working-directory: packages/web

      - name: 🏗️ Build Web App
        run: npm run build
        working-directory: packages/web

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: packages/web/dist/
          retention-days: 7

  # � Deploy Web App
  deploy-web:
    name: � Deploy Web App
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || 'STAGING' }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: packages/web/dist/

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔥 Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          PROJECT_ID="${{ github.ref == 'refs/heads/main' && 'modulo-squares-prod' || 'modulo-squares-dev' }}"
          firebase use $PROJECT_ID --token $FIREBASE_TOKEN
          firebase deploy --only hosting --token $FIREBASE_TOKEN

  # 📊 Deployment Summary
  deployment-summary:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality-check, build-web, deploy-web]
    if: always()
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## � CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Quality Check | ${{ needs.quality-check.result }} | Tests & Analysis |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Web Build | ${{ needs.build-web.result }} | Build artifacts created |" >> $GITHUB_STEP_SUMMARY
          echo "| � Web Deploy | ${{ needs.deploy-web.result }} | Firebase Hosting |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || 'STAGING' }}" >> $GITHUB_STEP_SUMMARY
