# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🔐 API Key Health Check

on:
  schedule:
    # Check API keys daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_check:
        description: 'Force immediate API key check'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.35.7'

jobs:
  api-key-health-check:
    name: 🔍 API Key Health Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Check API Key Health
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          chmod +x scripts/check-api-key.sh
          ./scripts/check-api-key.sh

      - name: 📢 Alert on API Key Expiration
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['api-key-expired', 'security'],
              state: 'open'
            });

            if (issues.length === 0) {
              // Create new issue if none exists
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 App Store Connect API Key Expired - Requires Rotation',
                body: `## 🔐 API Key Rotation Required

            The App Store Connect API key used for automated iOS certificate management has expired.

            ### 📋 Immediate Action Required

            1. **Create new API key** in [App Store Connect](https://appstoreconnect.apple.com/access/api)
            2. **Update GitHub secrets** with new key details
            3. **Delete old key** from App Store Connect

            ### 🔧 Rotation Steps

            \`\`\`bash
            # 1. Create new key in App Store Connect
            # 2. Download .p8 file
            # 3. Convert to base64: cat AuthKey_*.p8 | base64 | tr -d '\\n'
            # 4. Update these GitHub secrets:
            #    - ASC_KEY_ID
            #    - ASC_ISSUER_ID
            #    - ASC_PRIVATE_KEY
            \`\`\`

            ### 🚨 Impact

            - **iOS CI/CD builds will fail** until key is rotated
            - **Certificate generation blocked**
            - **TestFlight uploads unavailable**

            ### ⏰ Timeline

            App Store Connect API keys expire **1 year** after creation. Set up calendar reminders for annual rotation.

            ### 🤖 ZERO-TOUCH Vision

            This manual process breaks the ZERO-TOUCH promise. Future enhancement: Automated key rotation via Apple's API (when available).

            ---

            *This issue was automatically created by the API Key Health Check workflow.*`,
                labels: ['api-key-expired', 'security', 'zero-touch', 'ios', 'urgent']
              });

              // Send notification to repository owner
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: (await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: ['api-key-expired'],
                  state: 'open'
                })).data[0].number,
                body: `👋 @${context.repo.owner} - The App Store Connect API key has expired and requires immediate rotation to restore iOS CI/CD functionality.`
              });
            }

      - name: ✅ Success Notification
        if: success()
        run: |
          echo "🎉 API key health check passed - ZERO-TOUCH system operational"