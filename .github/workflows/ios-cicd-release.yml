# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🍎 iOS CI/CD & Release Pipeline

# Unified iOS workflow for CI/CD builds and formal releases
# Handles automatic builds, TestFlight distribution, and App Store releases

on:
  push:
    branches:
      - main
      - staging
      - develop
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/ios-cicd-release.yml'
      - '.github/actions/**'
      - 'pubspec.yaml'
      - 'firebase*.json'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Workflow mode: CI/CD build or formal release'
        required: true
        default: 'ci_cd'
        type: choice
        options:
          - ci_cd
          - release
      release_type:
        description: 'Type of release (only for release mode)'
        required: false
        default: 'testflight'
        type: choice
        options:
          - testflight
          - app_store
          - full_pipeline
      build_type:
        description: 'Build type (only for CI/CD mode)'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      release_notes:
        description: 'Release notes for this build/release'
        required: false
        type: string
      beta_group_name:
        description: 'Name of TestFlight beta group (for full pipeline)'
        required: false
        default: 'Internal Testers'
        type: string
  release:
    types: [published]

jobs:
  ios-workflow:
    runs-on: [self-hosted, modulo-squares]
    environment:
      name: ${{ (github.event.inputs.mode == 'release' && github.event.inputs.release_type == 'app_store') && 'PRODUCTION' || github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
    steps:
      - name: iOS Build Environment Check
        run: |
          echo '🍎 Running on self-hosted macOS runner'
          echo '📍 Hostname: $(hostname)'
          echo '💰 Using self-hosted runner (cost savings)'
          echo '🖥️  macOS version: $(sw_vers -productVersion)'
          echo '🛠️  Xcode version: $(xcodebuild -version | head -1)'

      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⏰ Sync NTP Time
        run: |
          echo '🔄 Synchronizing system time with NTP...'
          sudo sntp -sS time.apple.com || sudo ntpdate -u time.apple.com || echo '⚠️ NTP sync failed, continuing...'

      - name: 🏃 Check Runner Compatibility
        id: check-runner
        run: |
          if [ "$RUNNER_OS" = "Linux" ] && [ "$RUNNER_ARCH" = "ARM64" ]; then
            echo "ARM64 Linux detected - skipping Flutter operations"
            echo "skip-flutter=true" >> $GITHUB_OUTPUT
          else
            echo "Compatible runner - proceeding with Flutter operations"
            echo "skip-flutter=false" >> $GITHUB_OUTPUT
          fi

      - name: 🦋 Setup Flutter
        if: steps.check-runner.outputs.skip-flutter != 'true'
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: '3.38.4'
          cache-bust: v3

      - name: 🔧 Install GMP (Ruby dependency)
        run: |
          echo '📦 Installing GMP library...'
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install gmp
          elif [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libgmp-dev
          else
            echo "Unsupported OS for GMP installation: $RUNNER_OS"
            exit 1
          fi
          echo '✅ GMP installed successfully'

      - name: 💎 Setup Ruby
        run: |
          echo '🔄 Setting up Ruby 3.2.2...'
          RUBY_VERSION="3.2.2"
          RUBY_PATH="/opt/hostedtoolcache/Ruby/${RUBY_VERSION}/arm64"
          
          # Check if Ruby is already installed
          if [ -f "${RUBY_PATH}.complete" ] && [ -x "${RUBY_PATH}/bin/ruby" ]; then
            echo "✅ Ruby ${RUBY_VERSION} already installed"
          else
            echo "📦 Installing Ruby ${RUBY_VERSION}..."
            
            # Install system dependencies for Ruby build
            if [ "$RUNNER_OS" = "Linux" ]; then
              echo "📦 Installing Ruby build dependencies..."
              sudo apt-get update
              sudo apt-get install -y build-essential libssl-dev libreadline-dev zlib1g-dev libffi-dev libyaml-dev
            fi
            
            # Install/update ruby-build from source for latest definitions
            if ! command -v ruby-build &> /dev/null || ! ruby-build --definitions | grep -q "^${RUBY_VERSION}$"; then
              echo "📦 Installing/updating ruby-build from source..."
              if [ "$RUNNER_OS" = "macOS" ]; then
                brew install ruby-build
              elif [ "$RUNNER_OS" = "Linux" ]; then
                # Remove old ruby-build and install from source
                sudo apt-get remove -y ruby-build 2>/dev/null || true
                git clone https://github.com/rbenv/ruby-build.git /tmp/ruby-build
                cd /tmp/ruby-build
                sudo ./install.sh
                cd -
                rm -rf /tmp/ruby-build
              fi
            fi
            
            # Install Ruby using ruby-build
            sudo mkdir -p "${RUBY_PATH}"
            ruby-build "${RUBY_VERSION}" "${RUBY_PATH}"
            sudo touch "${RUBY_PATH}.complete"
            echo "✅ Ruby ${RUBY_VERSION} installed successfully"
          fi
          
          # Add Ruby to PATH
          echo "${RUBY_PATH}/bin" >> $GITHUB_PATH
          export PATH="${RUBY_PATH}/bin:$PATH"
          
          # Verify Ruby installation
          ruby --version
          
          # Install bundler if not available
          if ! command -v bundle &> /dev/null; then
            echo "📦 Installing bundler..."
            gem install bundler
          fi
          
          echo "✅ Ruby setup complete"

      - name: 🔧 Install Fastlane
        run: |
          echo '📦 Installing Fastlane 2.229.0...'
          gem install fastlane -v 2.229.0
          fastlane --version
          echo '✅ Fastlane installed successfully'

      - name: 🔐 Setup App Store Connect Authentication
        run: |
          echo '🔄 Setting up App Store Connect authentication...'

          # Create ASC private key file
          mkdir -p ~/.private_keys
          echo '${{ secrets.ASC_PRIVATE_KEY }}' | base64 -d > ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

          # Verify the key was created
          if [ -f ~/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 ]; then
            echo '✅ ASC private key created successfully'
          else
            echo '❌ Failed to create ASC private key'
            exit 1
          fi

      - name: 🧪 Test App Store Connect JWT
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          echo '🔄 Testing App Store Connect JWT authentication...'
          ruby -e "
          require 'jwt'
          require 'openssl'

          key_id = ENV['ASC_KEY_ID']
          issuer_id = ENV['ASC_ISSUER_ID']
          private_key_path = \"#{ENV['HOME']}/.private_keys/AuthKey_#{key_id}.p8\"

          private_key = OpenSSL::PKey::EC.new(File.read(private_key_path))

          now = Time.now.to_i
          payload = {
            iss: issuer_id,
            exp: now + 1200,
            aud: 'appstoreconnect-v1'
          }

          headers = {
            kid: key_id
          }

          token = JWT.encode(payload, private_key, 'ES256', headers)
          puts '✅ JWT token generated successfully'
          puts '🔄 Testing API connectivity...'

          # Test API call
          system(\"curl -H 'Authorization: Bearer #{token}' 'https://api.appstoreconnect.apple.com/v1/apps' -o /dev/null -s -w '%{http_code}' | grep -q '200' && echo '✅ App Store Connect API accessible' || echo '⚠️ App Store Connect API test inconclusive'\")
          "

      - name: 📱 Generate iOS Platform Files
        if: steps.check-runner.outputs.skip-flutter != 'true'
        run: |
          echo '🔄 Generating iOS platform files...'
          cd packages/mobile
          flutter create --platforms=ios .
          echo '✅ iOS platform files generated'

      - name: 🔐 Setup Service Account Key
        run: |
          echo '🔄 Setting up Firebase service account key...'
          mkdir -p packages/mobile/ios
          echo '${{ github.ref == 'refs/heads/main' && secrets.FIREBASE_SERVICE_ACCOUNT_KEY_PRODUCTION || github.ref == 'refs/heads/staging' && secrets.FIREBASE_SERVICE_ACCOUNT_KEY_STAGING || secrets.FIREBASE_SERVICE_ACCOUNT_KEY_DEVELOPMENT }}' > packages/mobile/ios/service-account-key.json
          echo '✅ Service account key configured'

      - name: 🔐 Decode iOS Distribution Certificate
        run: |
          echo '🔄 Decoding iOS distribution certificate...'
          mkdir -p packages/mobile/ios/certs
          echo '${{ secrets.IOS_CERT_P12_BASE64 }}' | base64 -d > packages/mobile/ios/certs/dist_cert.p12
          if [ -f packages/mobile/ios/certs/dist_cert.p12 ]; then
            echo '✅ iOS distribution certificate decoded'
          else
            echo '❌ Failed to decode iOS distribution certificate'
            exit 1
          fi

      - name: 🔑 Setup Ephemeral Keychain
        if: steps.check-runner.outputs.skip-flutter != 'true'
        run: |
          echo '🔄 Setting up ephemeral keychain...'
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo 'KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD' >> $GITHUB_ENV

          # Create ephemeral keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" fastlane_tmp_keychain
          security set-keychain-settings -lut 21600 fastlane_tmp_keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" fastlane_tmp_keychain

          # Make it the default keychain
          security default-keychain -s fastlane_tmp_keychain

          # Import certificate
          if [ -f packages/mobile/ios/certs/dist_cert.p12 ]; then
            security import packages/mobile/ios/certs/dist_cert.p12 -k fastlane_tmp_keychain -P "${{ secrets.IOS_CERT_PASSWORD }}" -T /usr/bin/codesign
            echo '✅ Certificate imported to keychain'
          else
            echo '⚠️ No certificate file found, skipping import'
          fi

          echo '✅ Ephemeral keychain setup complete'

      - name: 🏗️ Build and Distribute iOS App
        if: steps.check-runner.outputs.skip-flutter != 'true'
        run: |
          echo '🚀 Building and distributing iOS app...'

          # Set release notes
          RELEASE_NOTES='${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}'
          echo 'RELEASE_NOTES=$RELEASE_NOTES' >> $GITHUB_ENV

          cd packages/mobile/ios

          # Configure Fastlane environment
          export FASTLANE_APPLE_ID='${{ secrets.FASTLANE_APPLE_ID }}'
          export FASTLANE_TEAM_ID='${{ secrets.FASTLANE_TEAM_ID }}'
          export FASTLANE_ITC_TEAM_ID='${{ secrets.FASTLANE_ITC_TEAM_ID }}'
          export ASC_KEY_ID='${{ secrets.ASC_KEY_ID }}'
          export ASC_ISSUER_ID='${{ secrets.ASC_ISSUER_ID }}'
          export ASC_PRIVATE_KEY='${{ secrets.ASC_PRIVATE_KEY }}'
          export MATCH_GIT_URL='${{ secrets.MATCH_GIT_URL }}'
          export MATCH_PASSWORD='${{ secrets.MATCH_PASSWORD }}'
          export BETA_FEEDBACK_EMAIL='${{ secrets.BETA_FEEDBACK_EMAIL }}'
          export KEYCHAIN_PASSWORD='$KEYCHAIN_PASSWORD'

          # Determine workflow mode and execute appropriate Fastlane command
          WORKFLOW_MODE='${{ github.event.inputs.mode || '\''ci_cd'\'' }}'

          if [[ '$WORKFLOW_MODE' == 'release' ]]; then
            # Release mode: execute based on release_type input
            RELEASE_TYPE='${{ github.event.inputs.release_type }}'
            BETA_GROUP_NAME='${{ github.event.inputs.beta_group_name || '\''Internal Testers'\'' }}'

            case "$RELEASE_TYPE" in
              "testflight")
                echo '🎯 Running TestFlight release...'
                bundle exec fastlane beta
                ;;
              "app_store")
                echo '🏪 Running App Store submission...'
                bundle exec fastlane submit_to_app_store release_notes:"$RELEASE_NOTES"
                ;;
              "full_pipeline")
                echo '🚀 Running complete release pipeline...'
                bundle exec fastlane full_release_pipeline release_notes:"$RELEASE_NOTES" manage_beta:true beta_group_name:"$BETA_GROUP_NAME" submit_to_app_store:true
                ;;
              *)
                echo "❌ Unknown release type: $RELEASE_TYPE"
                exit 1
                ;;
            esac
          else
            # CI/CD mode: execute based on branch
            if [[ '$GITHUB_REF' == 'refs/heads/main' ]] || [[ '$GITHUB_REF' == 'refs/heads/staging' ]]; then
              # Production/Staging branches: Upload to TestFlight
              echo '🚀 Building and uploading to TestFlight (CI/CD)...'
              fastlane beta
            else
              # Development branch: Just build and test
              echo '🔨 Building for development testing (CI/CD)...'
              fastlane build_development
            fi
          fi

      - name: 🧹 Clean Up
        if: always()
        run: |
          echo '🧹 Cleaning up temporary files and keychains...'

          # Delete ephemeral keychain (macOS only)
          if [ "$RUNNER_OS" = "macOS" ]; then
            security delete-keychain fastlane_tmp_keychain 2>/dev/null || true
          fi

          # Clean up private keys
          rm -rf ~/.private_keys

          # Clean up service account files
          rm -f packages/mobile/ios/service-account-key.json

          # Clean up certificates
          rm -rf packages/mobile/ios/certs

          echo '✅ Cleanup complete'
