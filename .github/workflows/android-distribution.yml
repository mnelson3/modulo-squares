# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 📱 Android App Distribution

on:
  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/android-distribution.yml'
      - 'pubspec.yaml'
      - 'firebase*.json'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to distribute'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
      dry_run:
        description: 'Run in dry-run mode (skip actual distribution)'
        required: false
        default: true
        type: boolean
      release_notes:
        description: 'Release notes for this build'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.32.0'
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' || contains(github.event.head_commit.message, '[DRY-RUN]') || contains(github.event.head_commit.message, '[SKIP-DEPLOY]') }}

jobs:
  distribute-android:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: � Check Dry Run Status
        run: |
          if [[ "${{ env.DRY_RUN }}" == "true" ]]; then
            echo "🏃 DRY RUN MODE: Skipping actual app distribution"
            echo "This run will test the build process without distributing"
          else
            echo "📱 LIVE MODE: App distribution will proceed"
          fi

      - name: 🔧 Generate Android Platform Files
        run: flutter create --platforms=android .
        working-directory: packages/mobile

      - name: 🔐 Create Service Account Key File
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p packages/mobile/android/app
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > packages/mobile/android/app/service-account-key.json

      - name: 🔧 Make Distribution Script Executable
        run: chmod +x packages/mobile/distribute-android.sh

      - name: 📱 Extract AdMob Configuration for Production
        if: github.ref == 'refs/heads/main'
        run: |
          # Read AdMob unit IDs from .env.prod file
          ADMOB_BANNER_ANDROID=$(grep "^ADMOB_BANNER_UNIT_ID_ANDROID=" .env.prod | cut -d '=' -f2)
          ADMOB_INTERSTITIAL_ANDROID=$(grep "^ADMOB_INTERSTITIAL_UNIT_ID_ANDROID=" .env.prod | cut -d '=' -f2)
          ADMOB_REWARDED_ANDROID=$(grep "^ADMOB_REWARDED_UNIT_ID_ANDROID=" .env.prod | cut -d '=' -f2)

          # Export as environment variables for the build script
          echo "ADMOB_BANNER_UNIT_ID=$ADMOB_BANNER_ANDROID" >> $GITHUB_ENV
          echo "ADMOB_INTERSTITIAL_UNIT_ID=$ADMOB_INTERSTITIAL_ANDROID" >> $GITHUB_ENV
          echo "ADMOB_REWARDED_UNIT_ID=$ADMOB_REWARDED_ANDROID" >> $GITHUB_ENV

      - name: 🏗️ Build and Distribute Android App
        if: env.DRY_RUN != 'true'
        env:
          ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
        run: |
          cd packages/mobile
          ./distribute-android.sh ${{ github.event.inputs.build_type || 'debug' }} "${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"

      - name: 🧹 Clean Up Service Account Key
        if: always()
        run: rm -f packages/mobile/android/app/service-account-key.json