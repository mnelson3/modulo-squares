# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 📱 Android App Distribution

on:
  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/android-distribution.yml'
      - '.github/actions/**'
      - 'pubspec.yaml'
      - 'firebase*.json'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to distribute'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
      dry_run:
        description: 'Run in dry-run mode (skip actual distribution)'
        required: false
        default: true
        type: boolean
      release_notes:
        description: 'Release notes for this build'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.38.4'
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' || contains(github.event.head_commit.message, '[DRY-RUN]') || contains(github.event.head_commit.message, '[SKIP-DEPLOY]') }}

jobs:
  distribute-android:
    runs-on: self-hosted
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
    steps:
      - name: 🏃 Check Runner Compatibility
        id: check-runner
        run: |
          if [ "$RUNNER_OS" = "Linux" ] && [ "$RUNNER_ARCH" = "ARM64" ]; then
            echo "ARM64 Linux detected - skipping Flutter operations"
            echo "skip-flutter=true" >> $GITHUB_OUTPUT
          else
            echo "Compatible runner - proceeding with Flutter operations"
            echo "skip-flutter=false" >> $GITHUB_OUTPUT
          fi

      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        if: steps.check-runner.outputs.skip-flutter != 'true'
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache-bust: v3

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        run: |
          # Download and install Android SDK command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O android-sdk.zip
          mkdir -p /opt/android-sdk/cmdline-tools
          unzip -q android-sdk.zip
          mv cmdline-tools /opt/android-sdk/cmdline-tools/latest
          
          # Set environment variables
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "PATH=/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV
          
          # Accept licenses
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # Install required SDK components
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: � Check Dry Run Status
        run: |
          if [[ "${{ env.DRY_RUN }}" == "true" ]]; then
            echo "🏃 DRY RUN MODE: Skipping actual app distribution"
            echo "This run will test the build process without distributing"
          else
            echo "📱 LIVE MODE: App distribution will proceed"
          fi

      - name: 🔧 Generate Android Platform Files
        if: steps.check-runner.outputs.skip-flutter != 'true'
        run: flutter create --platforms=android .
        working-directory: packages/mobile

      - name: 🔐 Create Service Account Key File
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p packages/mobile/android/app
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > packages/mobile/android/app/service-account-key.json

      - name: 🔧 Make Distribution Script Executable
        run: chmod +x packages/mobile/distribute-android.sh

      - name: 📱 Extract AdMob Configuration for Production
        if: steps.check-runner.outputs.skip-flutter != 'true' && github.ref == 'refs/heads/main'
        run: |
          # Read AdMob unit IDs from .env.production file
          ADMOB_BANNER_ANDROID=$(grep "^ADMOB_BANNER_UNIT_ID_ANDROID=" .env.production | cut -d '=' -f2)
          ADMOB_INTERSTITIAL_ANDROID=$(grep "^ADMOB_INTERSTITIAL_UNIT_ID_ANDROID=" .env.production | cut -d '=' -f2)
          ADMOB_REWARDED_ANDROID=$(grep "^ADMOB_REWARDED_UNIT_ID_ANDROID=" .env.production | cut -d '=' -f2)

          # Export as environment variables for the build script
          echo "ADMOB_BANNER_UNIT_ID=$ADMOB_BANNER_ANDROID" >> $GITHUB_ENV
          echo "ADMOB_INTERSTITIAL_UNIT_ID=$ADMOB_INTERSTITIAL_ANDROID" >> $GITHUB_ENV
          echo "ADMOB_REWARDED_UNIT_ID=$ADMOB_REWARDED_ANDROID" >> $GITHUB_ENV

      - name: 🏗️ Build and Distribute Android App
        if: steps.check-runner.outputs.skip-flutter != 'true' && env.DRY_RUN != 'true'
        env:
          ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
        run: |
          cd packages/mobile
          ./distribute-android.sh ${{ github.event.inputs.build_type || 'debug' }} "${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"

      - name: 🧹 Clean Up Service Account Key
        if: always()
        run: rm -f packages/mobile/android/app/service-account-key.json