name: Test iOS Secrets Access

on:
  workflow_dispatch:

jobs:
  test-secrets-access:
    runs-on: self-hosted
    steps:
      - name: Check MATCH_GIT_URL_TOKEN
        run: |
          if [ -z "$MATCH_GIT_URL_TOKEN" ]; then
            echo "❌ MATCH_GIT_URL_TOKEN secret is not set"
            exit 1
          else
            echo "✅ MATCH_GIT_URL_TOKEN secret is set (length: ${#MATCH_GIT_URL_TOKEN})"
          fi
        env:
          MATCH_GIT_URL_TOKEN: ${{ secrets.MATCH_GIT_URL_TOKEN }}

      - name: Check MATCH_PASSWORD
        run: |
          if [ -z "$MATCH_PASSWORD" ]; then
            echo "❌ MATCH_PASSWORD secret is not set"
            exit 1
          else
            echo "✅ MATCH_PASSWORD secret is set (length: ${#MATCH_PASSWORD})"
          fi
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Check FASTLANE_APPLE_ID
        run: |
          if [ -z "$FASTLANE_APPLE_ID" ]; then
            echo "❌ FASTLANE_APPLE_ID secret is not set"
            exit 1
          else
            echo "✅ FASTLANE_APPLE_ID secret is set"
          fi
        env:
          FASTLANE_APPLE_ID: ${{ secrets.FASTLANE_APPLE_ID }}

      - name: Test GitHub Token Access
        run: |
          echo "Testing GitHub token access to certificates repository..."
          if git ls-remote https://oauth2:$MATCH_GIT_URL_TOKEN@github.com/mnelson3/nelson-grey.git > /dev/null 2>&1; then
            echo "✅ GitHub token has access to nelson-grey repository"
          else
            echo "❌ GitHub token does not have access to nelson-grey repository"
            exit 1
          fi
        env:
          MATCH_GIT_URL_TOKEN: ${{ secrets.MATCH_GIT_URL_TOKEN }}