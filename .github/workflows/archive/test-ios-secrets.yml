name: 🧪 Test iOS Secrets

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'What to test'
        required: true
        default: 'certificates'
        type: choice
        options:
        - certificates
        - provisioning
        - full

env:
  FLUTTER_VERSION: '3.38.4'

jobs:
  test-ios-setup:
    runs-on: [self-hosted, macOS, ios]
    environment: DEVELOPMENT
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🏃 Check Runner Compatibility
        id: check-runner
        run: |
          if [ "$RUNNER_OS" = "Linux" ] && [ "$RUNNER_ARCH" = "ARM64" ]; then
            echo "ARM64 Linux detected - skipping Flutter operations"
            echo "skip-flutter=true" >> $GITHUB_OUTPUT
          else
            echo "Compatible runner - proceeding with Flutter operations"
            echo "skip-flutter=false" >> $GITHUB_OUTPUT
          fi

      - name: 🦋 Setup Flutter
        if: steps.check-runner.outputs.skip-flutter != 'true'
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: '3.38.4'

      - name: 🔧 Setup Xcode
        run: |
          # Check if Xcode is already properly selected
          CURRENT_XCODE=$(xcode-select -p 2>/dev/null || echo "")
          if [[ "$CURRENT_XCODE" == "/Applications/Xcode.app/Contents/Developer" ]]; then
            echo "✅ Xcode already properly selected"
          else
            echo "🔄 Attempting to select Xcode..."
            # Try to select Xcode (may require sudo on some systems)
            if xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null; then
              echo "✅ Xcode selected successfully"
            else
              echo "⚠️ Could not select Xcode (may already be selected or requires manual setup)"
            fi
          fi
          
          # Show Xcode version
          xcodebuild -version

      - name: 🧪 Test Provisioning Profile Installation
        if: inputs.test_type == 'provisioning' || inputs.test_type == 'full'
        run: |
          echo "Testing provisioning profile installation..."
          
          # Create provisioning profiles directory
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Test provisioning profile installation
          if [ ! -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision
            
            if [ -f ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision ]; then
              echo "✅ Provisioning profile installed successfully"
              
              # Verify bundle ID
              if security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision | grep -q "com.nelsongrey.modulosquares.app.ios"; then
                echo "✅ Provisioning profile contains correct bundle ID"
              else
                echo "❌ Provisioning profile does not contain correct bundle ID"
                exit 1
              fi
            else
              echo "❌ Failed to install provisioning profile"
              exit 1
            fi
          else
            echo "❌ IOS_PROVISIONING_PROFILE_BASE64 secret not set"
            exit 1
          fi
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}

      - name: 🧪 Test Certificate Installation
        if: inputs.test_type == 'certificates' || inputs.test_type == 'full'
        run: |
          echo "Testing certificate installation..."
          
          if [ ! -z "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" ]; then
            # Import certificate to default keychain
            echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > /tmp/test_cert.p12
            
            if security import /tmp/test_cert.p12 -P "$IOS_CERTIFICATE_PASSWORD" -A 2>/dev/null; then
              echo "✅ Certificate imported successfully"
              
              # Check for valid identities
              if security find-identity -v | grep -q "Apple Distribution"; then
                echo "✅ Found Apple Distribution certificate"
                security find-identity -v
              else
                echo "❌ No Apple Distribution certificate found"
                echo "📋 Available identities in default keychain:"
                security find-identity -v || true
                echo ""
                echo "💡 For TestFlight builds, you need an 'Apple Distribution' certificate"
                echo "   You currently have a different type of certificate."
                echo "   Check locally with: security find-identity -v -p codesigning"
                exit 1
              fi
            else
              echo "❌ Certificate import failed"
              exit 1
            fi
            
            # Clean up
            rm -f /tmp/test_cert.p12
          else
            echo "❌ IOS_DISTRIBUTION_CERTIFICATE_BASE64 secret not set"
            exit 1
          fi
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: 🧪 Test Fastlane Configuration
        if: inputs.test_type == 'full'
        run: |
          echo "Testing Fastlane configuration..."
          
          cd packages/mobile
          
          # Use bundle install with existing Gemfile instead of global gem install
          bundle install
          
          cd ios
          
          # Test Fastlane setup by listing available lanes
          if bundle exec fastlane lanes 2>&1 | grep -q "beta"; then
            echo "✅ Fastlane configuration is valid - beta lane found"
          else
            echo "❌ Fastlane configuration has issues - beta lane not found"
            echo "Available lanes:"
            bundle exec fastlane lanes || true
            exit 1
          fi