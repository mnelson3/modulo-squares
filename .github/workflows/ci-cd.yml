name: 🚀 CI/CD Pipeline - Build, Test & Deploy

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'STAGING'
        type: choice
        options:
          - PRODUCTION
          - STAGING
          - DEVELOPMENT

env:
  FLUTTER_VERSION: '3.32.0'
  NODE_VERSION: '18'

jobs:
  # 🔍 Determine Environment
  determine-environment:
    name: �� Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should-deploy: ${{ steps.set-env.outputs.should-deploy }}
    steps:
      - name: 📋 Set Environment Variables
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_ENV=$(echo "${{ github.event.inputs.environment }}" | tr '[:upper:]' '[:lower:]')
            echo "environment=$INPUT_ENV" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  # 🔍 Code Quality & Testing
  quality-check:
    name: 🔍 Quality Check & Tests
    runs-on: ubuntu-latest
    needs: determine-environment
    outputs:
      should-deploy: ${{ needs.determine-environment.outputs.should-deploy }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get
        working-directory: packages/app

      - name: 🔧 Flutter Analyze
        run: flutter analyze
        working-directory: packages/app

      - name: 🧪 Run Tests
        run: flutter test --coverage
        working-directory: packages/app

      - name: 📊 Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: packages/app/coverage/lcov.info
          flags: flutter
          name: codecov-umbrella

  # 🏗️ Build Flutter Web App
  build-web:
    name: 🏗️ Build Flutter Web App
    runs-on: ubuntu-latest
    needs: [determine-environment, quality-check]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 🔄 Switch Mobile Configs
        run: npm run config:prod

      - name: �📦 Install Dependencies
        run: flutter pub get
        working-directory: packages/app

      - name: 🏗️ Build Web App
        run: flutter build web --release --web-renderer canvaskit
        working-directory: packages/app

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/app/build/web/
          retention-days: 7

  # 📱 Build Mobile Apps
  build-mobile:
    name: 📱 Build Mobile Apps
    runs-on: ubuntu-latest
    needs: [determine-environment, quality-check]
    if: needs.determine-environment.outputs.should-deploy == 'true'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 🔄 Switch Mobile Configs
        run: npm run config:${{ needs.determine-environment.outputs.environment }}

      - name: �📦 Install Dependencies
        run: flutter pub get
        working-directory: packages/app

      - name: 🏗️ Build Android APK
        run: flutter build apk --release
        working-directory: packages/app

      - name: 🏗️ Build Android AAB
        run: flutter build appbundle --release
        working-directory: packages/app

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: packages/app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: packages/app/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # 🚀 Deploy to Firebase Hosting
  deploy-web:
    name: 🔥 Deploy Web App to Firebase (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [determine-environment, quality-check, build-web]
    if: needs.determine-environment.outputs.should-deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/app/build/web/

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔥 Deploy to Firebase
        run: |
          PROJECT_ID="${{ needs.determine-environment.outputs.environment == 'production' && 'modulo-squares-prod' || needs.determine-environment.outputs.environment == 'staging' && 'modulo-squares-staging' || 'modulo-squares-dev' }}"
          TOKEN="${{ secrets[format('FIREBASE_TOKEN_{0}', needs.determine-environment.outputs.environment)] }}"
          firebase use $PROJECT_ID --token $TOKEN
          firebase deploy --only hosting --token $TOKEN

  # 📦 Create Release
  create-release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: [determine-environment, build-mobile]
    if: needs.determine-environment.outputs.environment == 'production' && github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: 📥 Download AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: .

      - name: 📦 Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## 🚀 Release v${{ github.run_number }}

            ### Changes
            - Automated release from main branch
            - Build: ${{ github.sha }}

            ### Downloads
            - [Android APK](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-release.apk)
            - [Android AAB](https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-release.aab)
          draft: false
          prerelease: false

      - name: 📤 Upload APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app-release.apk
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive

      - name: 📤 Upload AAB
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: app-release.aab
          asset_name: app-release.aab
          asset_content_type: application/vnd.android.package-archive

  # 📊 Deployment Summary
  deployment-summary:
    name: 📊 Deployment Summary (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-web, create-release]
    if: always() && needs.determine-environment.outputs.should-deploy == 'true'
    steps:
      - name: 📊 Generate Deployment Report
        run: |
          ENVIRONMENT="${{ needs.determine-environment.outputs.environment }}"
          echo "## 🔥 Firebase Deployment Summary - $ENVIRONMENT Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----|" >> $GITHUB_STEP_SUMMARY

          if [[ "$ENVIRONMENT" == "production" ]]; then
            WEB_URL="https://modulo-squares-prod.web.app"
          elif [[ "$ENVIRONMENT" == "staging" ]]; then
            WEB_URL="https://modulo-squares-staging.web.app"
          else
            WEB_URL="https://modulo-squares-dev.web.app"
          fi

          echo "| 🌐 Web App | ${{ needs.deploy-web.result }} | $WEB_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Mobile Release | ${{ needs.create-release.result }} | GitHub Releases |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: 🔥 Firebase Hosting + GitHub Releases" >> $GITHUB_STEP_SUMMARY
