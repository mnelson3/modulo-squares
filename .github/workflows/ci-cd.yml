name: 🚀 CI/CD Pipeline - Build, Test & Deploy

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'STAGING'
        type: choice
        options:
          - PRODUCTION
          - STAGING
          - DEVELOPMENT

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.44.2'
  NODE_VERSION: '20'

jobs:
  # 🔍 Determine Environment
  determine-environment:
    name: �� Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      should-deploy: ${{ steps.set-env.outputs.should-deploy }}
    steps:
      - name: 📋 Set Environment Variables
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_ENV=$(echo "${{ github.event.inputs.environment }}" | tr '[:upper:]' '[:lower:]')
            echo "environment=$INPUT_ENV" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "should-deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  # 🔍 Code Quality & Testing
  quality-check:
    name: 🔍 Quality Check & Tests
    runs-on: ubuntu-latest
    needs: determine-environment
    outputs:
      should-deploy: ${{ needs.determine-environment.outputs.should-deploy }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 🔧 Flutter Analyze
        run: flutter analyze
        working-directory: packages/mobile

      - name: 🧪 Run Tests
        timeout-minutes: 15
        run: flutter test --coverage
        working-directory: packages/mobile

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: packages/mobile/coverage/lcov.info
          retention-days: 7

  # 🏗️ Build React Web App
  build-web:
    name: 🏗️ Build React Web App
    runs-on: ubuntu-latest
    needs: [determine-environment, quality-check]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/web

      - name: 📦 Install Dependencies
        run: npm install
        working-directory: packages/web

      - name: 🏗️ Build Web App
        run: npm run build
        working-directory: packages/web

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/web/dist/
          retention-days: 7

  # 🍎 Build & Upload iOS App to TestFlight
  build-ios:
    name: 🍎 Build & Upload iOS to TestFlight
    runs-on: macos-latest
    needs: [determine-environment, quality-check]
    if: needs.determine-environment.outputs.should-deploy == 'true' && (needs.determine-environment.outputs.environment == 'production' || needs.determine-environment.outputs.environment == 'staging')
    environment: ${{ needs.determine-environment.outputs.environment }}
    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
      FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔄 Switch Mobile Configs
        run: |
          CONFIG_ENV="${{ needs.determine-environment.outputs.environment == 'production' && 'prod' || 'staging' }}"
          npm run config:$CONFIG_ENV

      - name: 📦 Flutter Dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: 🔧 Select Xcode Version
        run: |
          # Xcode 16.4 has a provisioning-profile resolution bug with automatic signing;
          # Xcode 26.x handles it correctly. Select the latest available Xcode 26+.
          LATEST=$(ls /Applications/ | grep -E "^Xcode_2[6-9]\.[0-9]+\.app$|^Xcode_[3-9][0-9]\.[0-9]+\.app$" | sort -t_ -k2 -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "/Applications/${LATEST}"
            echo "Selected $LATEST"
          else
            echo "No Xcode 26+ found; using default $(xcode-select -p)"
          fi
          xcodebuild -version

      - name: 💎 Install Fastlane Dependencies
        run: bundle install
        working-directory: packages/mobile/ios

      - name: 🚀 Build & Upload to TestFlight
        run: bundle exec fastlane beta
        working-directory: packages/mobile/ios
        env:
          RELEASE_NOTES: "Build ${{ github.run_number }} from ${{ github.sha }}"

  # 🚀 Deploy to Firebase Hosting
  deploy-web:
    name: 🔥 Deploy Web App to Firebase (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [determine-environment, quality-check, build-web]
    if: needs.determine-environment.outputs.should-deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📥 Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/web/dist/

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔥 Deploy to Firebase
        run: |
          CONFIG_ENV="${{ needs.determine-environment.outputs.environment == 'development' && 'dev' || needs.determine-environment.outputs.environment == 'staging' && 'staging' || 'prod' }}"
          cp firebase.$CONFIG_ENV.json firebase.json
          PROJECT_ID="${{ needs.determine-environment.outputs.environment == 'production' && 'modulo-squares-prod' || needs.determine-environment.outputs.environment == 'staging' && 'modulo-squares-staging' || 'modulo-squares-dev' }}"
          firebase use $PROJECT_ID --token "${{ secrets.FIREBASE_TOKEN }}"
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"

  # 📊 Deployment Summary
  deployment-summary:
    name: 📊 Deployment Summary (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-web]
    if: always() && needs.determine-environment.outputs.should-deploy == 'true'
    steps:
      - name: 📊 Generate Deployment Report
        run: |
          ENVIRONMENT="${{ needs.determine-environment.outputs.environment }}"
          echo "## 🔥 Firebase Deployment Summary - $ENVIRONMENT Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----|" >> $GITHUB_STEP_SUMMARY

          if [[ "$ENVIRONMENT" == "production" ]]; then
            WEB_URL="https://modulo-squares-prod.web.app"
          elif [[ "$ENVIRONMENT" == "staging" ]]; then
            WEB_URL="https://modulo-squares-staging.web.app"
          else
            WEB_URL="https://modulo-squares-dev.web.app"
          fi

          echo "| 🌐 Web App | ${{ needs.deploy-web.result }} | $WEB_URL |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: $ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: ⚛️ React Website + GitHub Releases" >> $GITHUB_STEP_SUMMARY
