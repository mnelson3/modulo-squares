name: 🔐 Test Repository Secrets

on:
  workflow_dispatch:
    inputs:
      test_firebase_auth:
        description: 'Test Firebase authentication with available tokens'
        required: false
        default: false
        type: boolean
      skip_summary:
        description: 'Skip detailed secret availability summary (more secure)'
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: '18'

jobs:
  test-secrets:
    name: 🔐 Test Repository Secrets
    runs-on: self-hosted
    environment: development
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔍 Check Critical Secrets Availability
        if: inputs.skip_summary == false
        run: |
          echo "## 🔐 Critical Secrets Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Status | Notes |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-------|" >> $GITHUB_STEP_SUMMARY

          # Check Firebase tokens (without exposing names)
          firebase_tokens=0
          [[ -n "${FIREBASE_TOKEN:-}" ]] && ((firebase_tokens++))

          if [[ $firebase_tokens -gt 0 ]]; then
            echo "| Firebase Tokens | ✅ Available ($firebase_tokens found) | CI/CD authentication |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Firebase Tokens | ❌ Missing | Required for deployments |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check service account keys
          service_keys=0
          [[ -n "${FIREBASE_SERVICE_ACCOUNT_KEY:-}" ]] && ((service_keys++))
          [[ -n "${IOS_SERVICE_ACCOUNT_KEY:-}" ]] && ((service_keys++))

          if [[ $service_keys -gt 0 ]]; then
            echo "| Service Account Keys | ✅ Available ($service_keys found) | App distribution |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Service Account Keys | ❌ Missing | Required for app distribution |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Note**: Detailed secret names are not exposed in workflow logs." >> $GITHUB_STEP_SUMMARY

      - name: 🔑 Test Firebase Authentication
        if: inputs.test_firebase_auth == true
        run: |
          echo "## 🔑 Firebase Authentication Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test available Firebase tokens without exposing values
          tested_tokens=0
          successful_tests=0

          # Test single Firebase token
          if [[ -n "${FIREBASE_TOKEN:-}" ]]; then
            ((tested_tokens++))
            if firebase projects:list --token="${FIREBASE_TOKEN}" >/dev/null 2>&1; then
              ((successful_tests++))
              echo "| Firebase Token | ✅ Valid | Authentication successful |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Firebase Token | ❌ Invalid | Check token configuration |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          if [[ $tested_tokens -eq 0 ]]; then
            echo "| No Tokens | ⚠️ Skipped | No Firebase tokens configured |" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Results**: $successful_tests/$tested_tokens tokens validated successfully" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📊 Generate Security Report
        run: |
          echo "## 📋 Security Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ inputs.skip_summary }}" == "true" ]]; then
            echo "| Secret Summary | ⏭️ Skipped | Security precaution |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Secret Summary | ✅ Generated | Critical secrets checked |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ inputs.test_firebase_auth }}" == "true" ]]; then
            echo "| Firebase Auth Test | ✅ Executed | Authentication validated |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Firebase Auth Test | ⏭️ Skipped | Not requested |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**�️ Security Features**:" >> $GITHUB_STEP_SUMMARY
          echo "- Secret names not exposed in logs" >> $GITHUB_STEP_SUMMARY
          echo "- Optional detailed reporting" >> $GITHUB_STEP_SUMMARY
          echo "- Environment-specific token testing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test completed at**: $(date)" >> $GITHUB_STEP_SUMMARY