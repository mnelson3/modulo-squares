# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🍎 iOS App Distribution

on:
  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/ios-distribution.yml'
      - 'pubspec.yaml'
      - 'firebase*.json'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to distribute'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
      release_notes:
        description: 'Release notes for this build'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.35.7'

jobs:
  distribute-ios:
    runs-on: [self-hosted, macos-latest]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        run: |
          # Download and setup Flutter manually
          FLUTTER_VERSION="${{ env.FLUTTER_VERSION }}"
          FLUTTER_ARCHIVE="flutter_macos_${FLUTTER_VERSION}-stable.zip"
          FLUTTER_URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/${FLUTTER_ARCHIVE}"
          
          echo "Downloading Flutter ${FLUTTER_VERSION}..."
          curl -L "$FLUTTER_URL" -o "$RUNNER_TEMP/flutter.zip"
          
          echo "Extracting Flutter..."
          unzip -q "$RUNNER_TEMP/flutter.zip" -d "$RUNNER_TEMP"
          
          echo "Setting up Flutter path..."
          FLUTTER_BIN="$RUNNER_TEMP/flutter/bin"
          echo "$FLUTTER_BIN" >> $GITHUB_PATH
          export PATH="$FLUTTER_BIN:$PATH"
          
          echo "Checking Flutter binary permissions..."
          ls -la "$FLUTTER_BIN/flutter"
          file "$FLUTTER_BIN/flutter"
          
          echo "Running flutter doctor to initialize..."
          "$FLUTTER_BIN/flutter" doctor --verbose || echo "Flutter doctor failed, but continuing..."
          
          echo "Verifying Flutter installation..."
          "$FLUTTER_BIN/flutter" --version

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: 📦 Install Fastlane
        run: gem install fastlane

      - name: 📦 Install Dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: 🔧 Generate iOS Platform Files
        run: flutter create --platforms=ios .
        working-directory: packages/mobile

      - name: 🔐 Create Service Account Key File
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p packages/mobile/ios
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > packages/mobile/ios/service-account-key.json

      - name: 🔧 Make Distribution Script Executable
        run: chmod +x packages/mobile/distribute-ios.sh

      - name: 📱 Extract AdMob Configuration for Production
        if: github.ref == 'refs/heads/main'
        run: |
          # Read AdMob unit IDs from .env.production file
          ADMOB_BANNER_IOS=$(grep "^ADMOB_BANNER_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)
          ADMOB_INTERSTITIAL_IOS=$(grep "^ADMOB_INTERSTITIAL_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)
          ADMOB_REWARDED_IOS=$(grep "^ADMOB_REWARDED_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)

          # Export as environment variables for the build script
          echo "ADMOB_BANNER_UNIT_ID=$ADMOB_BANNER_IOS" >> $GITHUB_ENV
          echo "ADMOB_INTERSTITIAL_UNIT_ID=$ADMOB_INTERSTITIAL_IOS" >> $GITHUB_ENV
          echo "ADMOB_REWARDED_UNIT_ID=$ADMOB_REWARDED_IOS" >> $GITHUB_ENV

      - name: 🏗️ Build and Distribute iOS App
        env:
          ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
        run: |
          cd packages/mobile
          ./distribute-ios.sh ${{ github.event.inputs.build_type || 'debug' }} "${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"

      - name: 🧹 Clean Up Service Account Key
        if: always()
        run: rm -f packages/mobile/ios/service-account-key.json