# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🍎 iOS App Distribution

on:
  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/ios-distribution.yml'
      - '.github/actions/**'
      - 'pubspec.yaml'
      - 'firebase*.json'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to distribute'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
      release_notes:
        description: 'Release notes for this build'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.35.7'

jobs:
  distribute-ios:
    runs-on: [self-hosted, macos-latest]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: 📦 Install Ruby Dependencies
        run: |
          cd packages/mobile
          bundle install

      - name: 🛠️ Setup Xcode
        run: |
          # Check if Xcode is already properly selected
          CURRENT_XCODE=$(xcode-select -p 2>/dev/null || echo "")
          if [[ "$CURRENT_XCODE" == "/Applications/Xcode.app/Contents/Developer" ]]; then
            echo "✅ Xcode already properly selected"
          else
            echo "🔄 Attempting to select Xcode..."
            # Try to select Xcode (may require sudo on some systems)
            if sudo -n xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null; then
              echo "✅ Xcode selected successfully"
            else
              echo "⚠️ Could not select Xcode (may already be selected or requires manual setup)"
            fi
          fi
          
          # Check if Xcode license is already accepted
          if xcodebuild -license check 2>/dev/null; then
            echo "✅ Xcode license already accepted"
          else
            echo "🔄 Attempting to accept Xcode license..."
            # Try to accept license (may require sudo on some systems)
            if sudo -n xcodebuild -license accept 2>/dev/null; then
              echo "✅ Xcode license accepted successfully"
            else
              echo "⚠️ Could not accept Xcode license (may already be accepted or requires manual setup)"
            fi
          fi
          
          # Install additional simulator runtimes if available
          # This will install commonly needed runtimes
          xcodebuild -downloadPlatform iOS 2>/dev/null || echo "⚠️ Could not download iOS platform (may already be installed)"
          
          # List available runtimes for debugging
          echo "📱 Available iOS Simulator Runtimes:"
          xcrun simctl list runtimes | grep "iOS" || echo "No iOS runtimes found"
          
          # Create a default simulator if none exists
          if ! xcrun simctl list devices | grep -q "iPhone"; then
            echo "📱 Creating default iPhone simulator..."
            xcrun simctl create "iPhone 15 Pro" "iPhone 15 Pro" 2>/dev/null || echo "⚠️ Could not create simulator"
          fi

      - name:  Install Dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: 🔍 Check Flutter Doctor
        run: |
          flutter doctor -v
          echo "🔧 Checking iOS setup..."
          flutter doctor --ios || echo "⚠️ iOS setup issues detected"

      - name: 🔧 Generate iOS Platform Files
        run: flutter create --platforms=ios .
        working-directory: packages/mobile

      - name: 🔍 Check Secrets
        run: |
          TOKEN_LENGTH=${#MATCH_GIT_URL_TOKEN}
          if [ "$TOKEN_LENGTH" -eq 0 ]; then
            echo "❌ MATCH_GIT_URL_TOKEN secret is not set or empty"
            exit 1
          else
            echo "✅ MATCH_GIT_URL_TOKEN secret is set (length: $TOKEN_LENGTH)"
          fi
        env:
          MATCH_GIT_URL_TOKEN: ${{ secrets.MATCH_GIT_URL_TOKEN }}

      - name: 🔐 Create Service Account Key File
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p packages/mobile/ios
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > packages/mobile/ios/service-account-key.json

      - name: 🔧 Make Distribution Script Executable
        run: chmod +x packages/mobile/distribute-ios.sh

      - name: 📱 Extract AdMob Configuration for Production
        if: github.ref == 'refs/heads/main'
        run: |
          # Read AdMob unit IDs from .env.production file
          ADMOB_BANNER_IOS=$(grep "^ADMOB_BANNER_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)
          ADMOB_INTERSTITIAL_IOS=$(grep "^ADMOB_INTERSTITIAL_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)
          ADMOB_REWARDED_IOS=$(grep "^ADMOB_REWARDED_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)

          # Export as environment variables for the build script
          echo "ADMOB_BANNER_UNIT_ID=$ADMOB_BANNER_IOS" >> $GITHUB_ENV
          echo "ADMOB_INTERSTITIAL_UNIT_ID=$ADMOB_INTERSTITIAL_IOS" >> $GITHUB_ENV
          echo "ADMOB_REWARDED_UNIT_ID=$ADMOB_REWARDED_IOS" >> $GITHUB_ENV

      - name: 🔐 Setup Fastlane Environment
        run: |
          cd packages/mobile/ios

          # Create .env file for Fastlane with all required environment variables
          cat > .env << EOF
          # Apple Developer Account
          FASTLANE_APPLE_ID=${{ secrets.FASTLANE_APPLE_ID }}
          FASTLANE_PASSWORD=${{ secrets.FASTLANE_PASSWORD }}
          FASTLANE_TEAM_ID=${{ secrets.FASTLANE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID=${{ secrets.FASTLANE_ITC_TEAM_ID }}

          # App Store Connect API Key
          ASC_KEY_ID=${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID=${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY=${{ secrets.ASC_PRIVATE_KEY }}

          # Match Configuration
          MATCH_GIT_URL=https://oauth2:${{ secrets.MATCH_GIT_URL_TOKEN }}@github.com/mnelson3/modulo-squares-certificates.git
          MATCH_PASSWORD=${{ secrets.MATCH_PASSWORD }}

          # TestFlight Configuration
          BETA_FEEDBACK_EMAIL=${{ secrets.BETA_FEEDBACK_EMAIL }}
          EOF

          # Create App Store Connect private key file from base64 encoded secret
          echo "${{ secrets.ASC_PRIVATE_KEY }}" | base64 -d > asc_private_key.p8

      - name: 🏗️ Build and Distribute iOS App
        env:
          ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
          FLUTTER_ROOT: ${{ env.FLUTTER_ROOT }}
        run: |
          cd packages/mobile
          ./distribute-ios.sh ${{ github.event.inputs.build_type || 'debug' }} "${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"

      - name: 🧹 Clean Up Service Account Key
        if: always()
        run: rm -f packages/mobile/ios/service-account-key.json packages/mobile/ios/asc_private_key.p8