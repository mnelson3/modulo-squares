# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🍎 iOS App Distribution

on:
  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/ios-distribution.yml'
      - '.github/actions/**'
      - 'pubspec.yaml'
      - 'firebase*.json'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to distribute'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
      release_notes:
        description: 'Release notes for this build'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.35.7'

jobs:
  distribute-ios:
    runs-on: [self-hosted, macos-latest]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache-bust: v3

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: 📦 Install Fastlane
        run: gem install fastlane

      - name: 🛠️ Setup Xcode
        run: |
          # Select the latest Xcode version (try without sudo first, fallback to sudo if needed)
          xcode-select -s /Applications/Xcode.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          
          # Accept Xcode license (try without sudo first, fallback to sudo if needed)
          xcodebuild -license accept || sudo xcodebuild -license accept
          
          # Install additional simulator runtimes if available
          # This will install commonly needed runtimes
          xcodebuild -downloadPlatform iOS 2>/dev/null || echo "⚠️ Could not download iOS platform (may already be installed)"
          
          # List available runtimes for debugging
          echo "📱 Available iOS Simulator Runtimes:"
          xcrun simctl list runtimes | grep "iOS" || echo "No iOS runtimes found"
          
          # Create a default simulator if none exists
          if ! xcrun simctl list devices | grep -q "iPhone"; then
            echo "📱 Creating default iPhone simulator..."
            xcrun simctl create "iPhone 15 Pro" "iPhone 15 Pro" 2>/dev/null || echo "⚠️ Could not create simulator"
          fi

      - name:  Install Dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: 🔍 Check Flutter Doctor
        run: |
          flutter doctor -v
          echo "🔧 Checking iOS setup..."
          flutter doctor --ios || echo "⚠️ iOS setup issues detected"

      - name: 🔧 Generate iOS Platform Files
        run: flutter create --platforms=ios .
        working-directory: packages/mobile

      - name: 🔐 Create Service Account Key File
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p packages/mobile/ios
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > packages/mobile/ios/service-account-key.json

      - name: 🔧 Make Distribution Script Executable
        run: chmod +x packages/mobile/distribute-ios.sh

      - name: 📱 Extract AdMob Configuration for Production
        if: github.ref == 'refs/heads/main'
        run: |
          # Read AdMob unit IDs from .env.production file
          ADMOB_BANNER_IOS=$(grep "^ADMOB_BANNER_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)
          ADMOB_INTERSTITIAL_IOS=$(grep "^ADMOB_INTERSTITIAL_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)
          ADMOB_REWARDED_IOS=$(grep "^ADMOB_REWARDED_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)

          # Export as environment variables for the build script
          echo "ADMOB_BANNER_UNIT_ID=$ADMOB_BANNER_IOS" >> $GITHUB_ENV
          echo "ADMOB_INTERSTITIAL_UNIT_ID=$ADMOB_INTERSTITIAL_IOS" >> $GITHUB_ENV
          echo "ADMOB_REWARDED_UNIT_ID=$ADMOB_REWARDED_IOS" >> $GITHUB_ENV

      - name: 🏗️ Build and Distribute iOS App
        env:
          ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
        run: |
          cd packages/mobile
          ./distribute-ios.sh ${{ github.event.inputs.build_type || 'debug' }} "${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"

      - name: 🧹 Clean Up Service Account Key
        if: always()
        run: rm -f packages/mobile/ios/service-account-key.json