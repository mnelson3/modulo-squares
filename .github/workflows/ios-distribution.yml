# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🍎 iOS App Distribution

on:
  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - 'packages/mobile/**'
      - '.github/workflows/ios-distribution.yml'
      - '.github/actions/**'
      - 'pubspec.yaml'
      - 'firebase*.json'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to distribute'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
      release_notes:
        description: 'Release notes for this build'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.35.7'

jobs:
  distribute-ios:
    runs-on: [self-hosted, macos-latest]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 💎 Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: 📦 Install Ruby Dependencies
        run: |
          cd packages/mobile
          bundle install

      - name: 🛠️ Setup Xcode
        run: |
          # Check if Xcode is already properly selected
          CURRENT_XCODE=$(xcode-select -p 2>/dev/null || echo "")
          if [[ "$CURRENT_XCODE" == "/Applications/Xcode.app/Contents/Developer" ]]; then
            echo "✅ Xcode already properly selected"
          else
            echo "🔄 Attempting to select Xcode..."
            # Try to select Xcode (may require sudo on some systems)
            if sudo -n xcode-select -s /Applications/Xcode.app/Contents/Developer 2>/dev/null; then
              echo "✅ Xcode selected successfully"
            else
              echo "⚠️ Could not select Xcode (may already be selected or requires manual setup)"
            fi
          fi
          
          # Check if Xcode license is already accepted
          if xcodebuild -license check 2>/dev/null; then
            echo "✅ Xcode license already accepted"
          else
            echo "🔄 Attempting to accept Xcode license..."
            # Try to accept license (may require sudo on some systems)
            if sudo -n xcodebuild -license accept 2>/dev/null; then
              echo "✅ Xcode license accepted successfully"
            else
              echo "⚠️ Could not accept Xcode license (may already be accepted or requires manual setup)"
            fi
          fi
          
          # Install additional simulator runtimes if available
          # This will install commonly needed runtimes
          xcodebuild -downloadPlatform iOS 2>/dev/null || echo "⚠️ Could not download iOS platform (may already be installed)"
          
          # List available runtimes for debugging
          echo "📱 Available iOS Simulator Runtimes:"
          xcrun simctl list runtimes | grep "iOS" || echo "No iOS runtimes found"
          
          # Create a default simulator if none exists
          if ! xcrun simctl list devices | grep -q "iPhone"; then
            echo "📱 Creating default iPhone simulator..."
            xcrun simctl create "iPhone 15 Pro" "iPhone 15 Pro" 2>/dev/null || echo "⚠️ Could not create simulator"
          fi

      - name:  Install Dependencies
        run: flutter pub get
        working-directory: packages/mobile

      - name: 🔍 Check Flutter Doctor
        run: |
          flutter doctor -v
          echo "🔧 Checking iOS setup..."
          flutter doctor --ios || echo "⚠️ iOS setup issues detected"

      - name: 🔧 Generate iOS Platform Files
        run: flutter create --platforms=ios .
        working-directory: packages/mobile

      - name: 🔐 Create Service Account Key File
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p packages/mobile/ios
          echo "$FIREBASE_SERVICE_ACCOUNT_KEY" > packages/mobile/ios/service-account-key.json

      - name: 🔧 Make Distribution Script Executable
        run: chmod +x packages/mobile/distribute-ios.sh

      - name: 📱 Install Provisioning Profile
        run: |
          # Create provisioning profiles directory if it doesn't exist
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Decode and install the provisioning profile
          if [ ! -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision
            
            # Verify the provisioning profile was installed
            if [ -f ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision ]; then
              echo "✅ Provisioning profile installed successfully"
              # Show profile info for debugging
              security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision | grep -A 5 -B 5 "Name\|UUID\|TeamIdentifier\|application-identifier" || true
              
              # Check if the bundle ID is in the profile
              if security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision | grep -q "com.nelsongrey.modulosquares.app.ios"; then
                echo "✅ Provisioning profile contains correct bundle ID"
                
                # Extract the provisioning profile name/UUID for Fastlane
                PROFILE_NAME=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision | grep -A 1 "Name" | tail -1 | sed 's/.*: //' | sed 's/<string>//' | sed 's/<\/string>//' | xargs)
                PROFILE_UUID=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision | grep -A 1 "UUID" | tail -1 | sed 's/.*: //' | sed 's/<string>//' | sed 's/<\/string>//' | xargs)
                
                echo "Profile Name: '$PROFILE_NAME'"
                echo "Profile UUID: '$PROFILE_UUID'"
                echo "IOS_PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
                echo "IOS_PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
              else
                echo "❌ Provisioning profile does not contain the correct bundle ID"
                security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/$IOS_PROVISIONING_PROFILE.mobileprovision | grep -A 10 "Entitlements" || true
                exit 1
              fi
            else
              echo "❌ Failed to install provisioning profile"
              exit 1
            fi
          else
            echo "⚠️ IOS_PROVISIONING_PROFILE_BASE64 secret not found"
            exit 1
          fi
          
          # Install distribution certificate if provided
          if [ ! -z "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" ]; then
            # Create a temporary keychain for CI
            KEYCHAIN_PATH=$HOME/Library/Keychains/build.keychain
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
            
            # Delete existing keychain if it exists
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
            
            # Create and unlock the keychain
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
            
            # Import certificate to the keychain
            echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > /tmp/ios_distribution.p12
            
            # Try to import with different options
            if ! security import /tmp/ios_distribution.p12 -P "$IOS_CERTIFICATE_PASSWORD" -A -k "$KEYCHAIN_PATH" 2>/dev/null; then
              echo "Standard import failed, trying alternative method..."
              # Try without -A flag (allow interaction) but in a way that works in CI
              security import /tmp/ios_distribution.p12 -P "$IOS_CERTIFICATE_PASSWORD" -k "$KEYCHAIN_PATH" || {
                echo "Certificate import failed. Checking certificate details..."
                openssl pkcs12 -info -in /tmp/ios_distribution.p12 -passin pass:"$IOS_CERTIFICATE_PASSWORD" -nokeys || true
                rm /tmp/ios_distribution.p12
                exit 1
              }
            fi
            
            rm /tmp/ios_distribution.p12
            
            # Verify certificate was imported
            if security find-identity -v "$KEYCHAIN_PATH" | grep -q "Apple Distribution"; then
              echo "✅ Distribution certificate installed successfully"
              echo "Available identities:"
              security find-identity -v "$KEYCHAIN_PATH"
              
              # Get the exact certificate name
              CERT_NAME=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Apple Distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
              echo "Using certificate: $CERT_NAME"
              echo "CERT_NAME=$CERT_NAME" >> $GITHUB_ENV
            else
              echo "❌ Failed to install distribution certificate"
              echo "Available identities in keychain:"
              security find-identity -v "$KEYCHAIN_PATH" || true
              exit 1
            fi
            
            # Set the keychain as default and unlock it
            security list-keychains -d user -s "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            
            echo "✅ Distribution certificate installed"
          else
            echo "⚠️ IOS_DISTRIBUTION_CERTIFICATE_BASE64 secret not found"
            exit 1
          fi
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: 📱 Extract AdMob Configuration for Production
        if: github.ref == 'refs/heads/main'
        run: |
          # Read AdMob unit IDs from .env.production file
          ADMOB_BANNER_IOS=$(grep "^ADMOB_BANNER_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)
          ADMOB_INTERSTITIAL_IOS=$(grep "^ADMOB_INTERSTITIAL_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)
          ADMOB_REWARDED_IOS=$(grep "^ADMOB_REWARDED_UNIT_ID_IOS=" .env.production | cut -d '=' -f2)

          # Export as environment variables for the build script
          echo "ADMOB_BANNER_UNIT_ID=$ADMOB_BANNER_IOS" >> $GITHUB_ENV
          echo "ADMOB_INTERSTITIAL_UNIT_ID=$ADMOB_INTERSTITIAL_IOS" >> $GITHUB_ENV
          echo "ADMOB_REWARDED_UNIT_ID=$ADMOB_REWARDED_IOS" >> $GITHUB_ENV

      - name: 🏗️ Build and Distribute iOS App
        env:
          ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'PRODUCTION' || github.ref == 'refs/heads/staging' && 'STAGING' || 'DEVELOPMENT' }}
          APP_STORE_CONNECT_PRIVATE_EMAIL: ${{ secrets.APP_STORE_CONNECT_PRIVATE_EMAIL }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          APP_STORE_CONNECT_TEAM_NAME: ${{ secrets.APP_STORE_CONNECT_TEAM_NAME }}
          IOS_PROVISIONING_PROFILE: ${{ env.IOS_PROVISIONING_PROFILE_UUID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
        run: |
          cd packages/mobile
          ./distribute-ios.sh ${{ github.event.inputs.build_type || 'debug' }} "${{ github.event.inputs.release_notes || format('Build from {0} - {1}', github.ref_name, github.sha) }}"

      - name: 🧹 Clean Up Service Account Key
        if: always()
        run: rm -f packages/mobile/ios/service-account-key.json