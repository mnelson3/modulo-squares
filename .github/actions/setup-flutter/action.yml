name: 'Setup Flutter'
description: 'Setup Flutter SDK with caching'

inputs:
  flutter-version:
    description: 'Flutter version to install'
    required: true
    default: '3.35.7'

runs:
  using: 'composite'
  steps:
    - name: 🦋 Setup Flutter
      run: |
        # Download and setup Flutter manually for ARM64
        FLUTTER_VERSION="${{ inputs.flutter-version }}"
        FLUTTER_ARCHIVE="flutter_macos_arm64_${FLUTTER_VERSION}-stable.zip"
        FLUTTER_URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/${FLUTTER_ARCHIVE}"
        
        echo "Downloading Flutter ${FLUTTER_VERSION} for ARM64..."
        curl -L "$FLUTTER_URL" -o "$RUNNER_TEMP/flutter.zip"
        
        echo "Extracting Flutter..."
        unzip -q "$RUNNER_TEMP/flutter.zip" -d "$RUNNER_TEMP"
        
        echo "Setting up Flutter path..."
        echo "$RUNNER_TEMP/flutter/bin" >> $GITHUB_PATH
        
        echo "Verifying Flutter installation..."
        flutter --version
      shell: bash

    - name: 📦 Install Flutter Dependencies
      run: flutter pub get
      shell: bash
      working-directory: packages/mobile