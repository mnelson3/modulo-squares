services:
  github-runner-modulo-squares:
    image: myoung34/github-runner:latest
    container_name: github-runner-modulo-squares
    env_file:
      - .env.runner
    environment:
      REPO_URL: https://github.com/mnelson3/modulo-squares
      RUNNER_NAME: modulo-squares-docker-runner
      RUNNER_WORKDIR: /tmp/runner/work
      LABELS: self-hosted,ARM64,linux,ubuntu-latest,docker,modulo-squares
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-work:/tmp/runner/work
      - /tmp:/tmp
    networks:
      - runner-network
    restart: unless-stopped

  # Optional: Runner with GPU support (uncomment if needed)
  # github-runner-gpu:
  #   image: myoung34/github-runner:latest
  #   container_name: modulo-squares-runner-gpu
  #   environment:
  #     REPO_URL: https://github.com/mnelson3/modulo-squares
  #     RUNNER_NAME: docker-runner-gpu-${HOSTNAME:-local}
  #     RUNNER_TOKEN: ${RUNNER_TOKEN}
  #     RUNNER_WORKDIR: /tmp/runner/work
  #     LABELS: self-hosted,ubuntu-latest,docker,modulo-squares,gpu
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - runner-work:/tmp/runner/work
  #     - /tmp:/tmp
  #   networks:
  #     - runner-network
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # Monitoring container (Node.js-based)
  runner-monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    container_name: modulo-squares-runner-monitor
    ports:
      - "8081:8081"
    volumes:
      - ./monitoring/status.html:/usr/share/nginx/html/index.html:ro
    networks:
      - runner-network
    restart: unless-stopped
    depends_on:
      - github-runner-modulo-squares

volumes:
  runner-work:
    driver: local

networks:
  runner-network:
    driver: bridge