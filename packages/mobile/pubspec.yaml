environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.0.15
  cloud_firestore: ^6.0.2
  firebase_core: ^4.1.1
  audioplayers: ^6.4.0
  flutter_lints: ^6.0.0
  firebase_auth: ^6.1.0
  google_sign_in: ^7.2.0
