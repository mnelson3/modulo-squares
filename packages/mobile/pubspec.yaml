  intl: ^0.20.2
  firebase_analytics: ^12.0.2
  google_mobile_ads: ^6.0.0
  get_it: ^9.0.5
  provider: ^6.1.2
  app_tracking_transparency: ^2.0.5
  in_app_purchase: ^3.1.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
