    <!--
      ┌─────────────────────────────────────────────────────────────────┐
      │  STEP 1 — Consent Mode v2 defaults                              │
      │  Must be the FIRST script on the page, before GTM loads.        │
      │  Sets all consent to "denied" until the user makes a choice.    │
      │  If the user previously accepted, consent is restored           │
      │  synchronously so GTM tags fire correctly on page reload.       │
      └─────────────────────────────────────────────────────────────────┘
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }

      // Default everything to denied before GTM initialises
      gtag('consent', 'default', {
        analytics_storage:    'denied',
        ad_storage:           'denied',
        ad_user_data:         'denied',
        ad_personalization:   'denied',
        functionality_storage:'granted',  // remembers UI prefs (non-tracking)
        security_storage:     'granted',  // fraud/bot protection
        wait_for_update:      500         // ms to wait for React banner update
      });

      // Restore a previously saved choice immediately so GTM doesn't
      // fire in "denied" mode for returning visitors who already consented.
      try {
        var _c = localStorage.getItem('ms_consent_v1');
        if (_c === 'all') {
          gtag('consent', 'update', {
            analytics_storage:  'granted',
            ad_storage:         'granted',
            ad_user_data:       'granted',
            ad_personalization: 'granted'
          });
        }
      } catch (_) {}
    </script>

    <!--
