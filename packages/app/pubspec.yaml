name: modulo
version: 0.0.1+1
description: A modulo based puzzle game with leaderboard.
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.0.15
  cloud_firestore: ^6.0.2
  firebase_core: ^4.1.1
  audioplayers: ^6.4.0
  flutter_lints: ^6.0.0
  firebase_auth: ^6.1.0
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^7.0.1
  intl: ^0.20.2
  firebase_analytics: ^12.0.2
  google_mobile_ads: ^5.1.0
  get_it: ^8.0.2
  app_tracking_transparency: ^2.0.5
  in_app_purchase: ^3.1.11

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
